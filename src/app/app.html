<div class="min-h-screen bg-linear-to-br from-sky-50 via-sky-100 to-sky-200 text-slate-900">
	<!-- Top bar -->
	<header class="sticky top-0 z-40 border-b border-slate-300 bg-sky-700/90 backdrop-blur animate-fadeIn">
		<div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 sm:py-4 sm:px-6 lg:px-8">
			<div class="flex items-center gap-2 sm:gap-3 animate-slideIn">
				<img src="/VillaMarLogo.png" alt="VillaMar logo" class="h-8 w-8 sm:h-10 sm:w-10 rounded-full object-cover shadow-lg" />
				<div>
					<h1 class="text-base sm:text-lg font-semibold tracking-wide">Inventario VillaMar</h1>
					<p class="text-xs text-slate-100 hidden sm:block">Tienda de cervezas, gaseosas, papas y dulces</p>
				</div>
			</div>
			<div class="flex items-center gap-2 animate-fadeIn">
				<button class="hidden sm:block rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 transition-all duration-200 hover:scale-105">
					Ayuda
				</button>
				<button
					routerLink="/stock"
					class="rounded-lg bg-linear-to-r from-sky-600 to-sky-700 px-3 sm:px-4 py-2 text-xs sm:text-sm font-semibold text-white shadow-lg hover:from-sky-700 hover:to-sky-800 transition-all duration-300 hover:scale-105 hover:shadow-xl whitespace-nowrap">
					+ Movimiento
				</button>
			</div>
		</div>
	</header>

	<div class="mx-auto grid max-w-7xl grid-cols-1 gap-4 sm:gap-6 px-4 py-4 sm:py-6 sm:px-6 lg:px-8 lg:grid-cols-12">
		<!-- Sidebar -->
		<aside class="lg:col-span-3 animate-slideIn">
			<nav class="rounded-2xl border border-slate-300 bg-white p-3 sm:p-4 shadow-lg hover:shadow-xl transition-shadow duration-300">
				<p class="mb-3 text-xs font-semibold uppercase tracking-widest text-slate-500">Menú</p>
				<ul class="space-y-1 sm:space-y-2 text-sm">
					<li>
						<button
							routerLink="/dashboard"
							class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-left font-semibold text-slate-800 transition-all duration-200 hover:scale-105"
							[class.bg-sky-100]="isActive('dashboard')"
							[class.shadow-lg]="isActive('dashboard')"
						>
							📊 Información
						</button>
					</li>
					<li>
						<button
							routerLink="/productos"
							class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-left text-slate-700 hover:bg-slate-100 transition-all duration-200 hover:scale-105"
							[class.bg-sky-100]="isActive('productos')"
							[class.font-semibold]="isActive('productos')"
						>
							📦 Productos
						</button>
					</li>
					<li>
						<button
							routerLink="/stock"
							class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-left text-slate-700 hover:bg-slate-100 transition-all duration-200 hover:scale-105"
							[class.bg-sky-100]="isActive('stock')"
							[class.font-semibold]="isActive('stock')"
						>
							📥 Stock
						</button>
					</li>
					<li>
						<button
							routerLink="/facturacion"
							class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-left text-slate-700 hover:bg-slate-100 transition-all duration-200 hover:scale-105"
							[class.bg-sky-100]="isActive('facturacion')"
							[class.font-semibold]="isActive('facturacion')"
						>
							🧾 Facturación
						</button>
					</li>
					<li>
						<button
							routerLink="/reportes"
							class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-left text-slate-700 hover:bg-slate-100 transition-all duration-200 hover:scale-105"
							[class.bg-sky-100]="isActive('reportes')"
							[class.font-semibold]="isActive('reportes')"
						>
							📈 Reportes
						</button>
					</li>
					<li>
						<button
							routerLink="/proveedores"
							class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-left text-slate-700 hover:bg-slate-100 transition-all duration-200 hover:scale-105"
							[class.bg-sky-100]="isActive('proveedores')"
							[class.font-semibold]="isActive('proveedores')"
						>
							🏢 Proveedores
						</button>
					</li>
					<li>
						<button
							routerLink="/categorias"
							class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-left text-slate-700 hover:bg-slate-100 transition-all duration-200 hover:scale-105"
							[class.bg-sky-100]="isActive('categorias')"
							[class.font-semibold]="isActive('categorias')"
						>
							📂 Categorías
						</button>
					</li>
					<li>
						<button
							routerLink="/clientes"
							class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-left text-slate-700 hover:bg-slate-100 transition-all duration-200 hover:scale-105"
							[class.bg-sky-100]="isActive('clientes')"
							[class.font-semibold]="isActive('clientes')"
						>
							👥 Clientes
						</button>
					</li>
					<li>
						<button
							routerLink="/manual"
							class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-left text-slate-700 hover:bg-slate-100 transition-all duration-200 hover:scale-105"
							[class.bg-sky-100]="isActive('manual')"
							[class.font-semibold]="isActive('manual')"
						>
							📘 Manual de Usuario
						</button>
					</li>
				</ul>
			</nav>

		<div class="mt-6 rounded-2xl bg-sky-700 p-5 text-white shadow-xl hover:shadow-2xl transition-all duration-300 animate-fadeIn">
			<p class="text-sm font-semibold">Estado del inventario</p>
			<p class="mt-1 text-3xl font-bold animate-pulse">{{ porcentajeStockSaludable }}%</p>
			<p class="mt-2 text-xs text-white">Stock actual vs stock máximo</p>
				<button routerLink="/reportes" class="mt-4 w-full rounded-lg bg-white/10 px-3 py-2 text-xs font-semibold hover:bg-white/20 transition-all duration-200 hover:scale-105">
					Ver reportes
				</button>
			</div>
		</aside>

		<!-- Main content -->
		<main class="lg:col-span-9">
			<!-- Router outlet: muestra el componente de la ruta activa -->
			<router-outlet></router-outlet>
		</main>
	</div>

	<footer class="bg-sky-800 mt-8">
		<div class="mx-auto flex max-w-7xl flex-col sm:flex-row items-center justify-between gap-2 sm:gap-3 px-4 py-4 sm:py-6 text-xs text-white sm:px-6 lg:px-8">
			<p class="hover:scale-105 transition-transform duration-200 text-center sm:text-left">© 2026 DANIEL ROJAS AREVALO</p>
			<p class="hover:scale-105 transition-transform duration-200 text-center sm:text-right">Hecho para VillaMar — inventario de tienda</p>
		</div>
	</footer>

	<app-modal></app-modal>
</div>
