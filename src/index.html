<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>VillaMar - Sistema de Inventario</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#16a34a">
  <meta name="description" content="Sistema de gestión de inventario de abonos para VillaMar">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VillaMar">
  <link rel="apple-touch-icon" href="VillaMarLogo.png">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            coffee: {
              50: "#f0fdf4",
              100: "#dcfce7",
              200: "#bbf7d0",
              300: "#86efac",
              400: "#4ade80",
              500: "#22c55e",
              600: "#16a34a",
              700: "#15803d",
              800: "#166534",
              900: "#14532d"
            },
            crema: "#fafaf9",
            tierra: "#78716c"
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' }
            },
            slideIn: {
              '0%': { transform: 'translateX(-20px)', opacity: '0' },
              '100%': { transform: 'translateX(0)', opacity: '1' }
            },
            pulse: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0.7' }
            }
          },
          animation: {
            fadeIn: 'fadeIn 0.5s ease-out',
            slideIn: 'slideIn 0.4s ease-out',
            pulse: 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite'
          }
        }
      }
    };
  </script>
  <link rel="icon" type="image/png" href="VillaMarLogo.png">
</head>
<body>
  <app-root></app-root>
</body>
</html>
